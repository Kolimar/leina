name: Release

# Publishes to npm with provenance when a version tag is pushed.
# The tag must match package.json's version (guarded below); publishing requires the
# NPM_TOKEN repository secret (an npm Granular Access Token with publish rights).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm --provenance (Sigstore attestation via GitHub OIDC)

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  publish:
    name: Publish to npm (provenance)
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Tag must match package.json version
        run: |
          PKG_V="v$(node -p "require('./package.json').version")"
          if [ "$PKG_V" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != package.json ${PKG_V}"
            exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
