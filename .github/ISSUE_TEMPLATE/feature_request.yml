name: Feature request
description: Suggest an idea or improvement for leina
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: >
        Describe the situation you're in and what's missing or awkward today.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >
        What would you like to see? A new command/flag, a change in behavior, a new
        capability — sketch it out, even roughly.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using today, or other approaches you considered.
