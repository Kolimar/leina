# Fixture: docker-compose.yml para el fixture mixed-repo.
# CLAVE: services.api.build.context apunta a src/api.ts (un archivo TS real).
# El YamlInfraExtractor emitirá una arista `reads` desde el nodo servicio api
# hacia el nodo módulo makeId("src/api.ts") — el mismo id que genera treesitter.ts.
# Esto permite que analyzeImpact desde makeId("src/api.ts") alcance el servicio.
version: "3.9"
services:
  api:
    build:
      context: ./src/api.ts
    ports:
      - "8080:8080"
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
